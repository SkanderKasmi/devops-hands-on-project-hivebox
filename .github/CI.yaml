#Continous  Integration workflow for Hivebox project
name: Contiouns Integration
on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
jobs:
  build:
    if: contains(github.event.head_commit.modified, '.md') 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with Hadolint
        uses: hadolint/hadolint-action@v1
        with:
          dockerfile: Dockerfile
      - name: Run tests
        run: |
          python -m unittest discover -s tests    
      - name: Build Docker image

        run: |
          docker build -t hivebox:latest .
      - name: Push Docker image to registry
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag hivebox:latest ${{ secrets.DOCKER_USERNAME }}/hivebox:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hivebox:latest
      